name: VIBE-001 Verify

on:
  push:
    branches: [master, main]
    paths:
      - 'verify/vibe-001/**'
  pull_request:
    branches: [master, main]
    paths:
      - 'verify/vibe-001/**'
  workflow_dispatch:

jobs:
  vibe-001-pool-contention:
    name: VIBE-001 — TransactionalAsync pool contention
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run VIBE-001 pool contention test
        working-directory: verify/vibe-001/app
        run: mvn test

  verify-vibe-001:
    name: VIBE-001 — CLI verify
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install CLI dependencies
        working-directory: cli
        run: npm ci

      - name: Install testcontainers-doctor
        run: npm install -g --ignore-scripts testcontainers-doctor@1.0.0

      - name: Run java-vibe-guard --verify VIBE-001
        run: node cli/bin/cli.js --verify VIBE-001
