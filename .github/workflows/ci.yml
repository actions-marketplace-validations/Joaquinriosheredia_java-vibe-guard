name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:

  # ── 1. Contract tests — validates the JSON schema and exit codes ─────────────
  contract-tests:
    name: CLI contract tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install CLI dependencies
        run: npm ci
        working-directory: cli

      - name: Run contract tests
        run: npm test
        working-directory: cli

  # ── 2. Self-scan — java-vibe-guard scans its own CLI source ─────────────────
  self-scan:
    name: Self-scan
    runs-on: ubuntu-latest
    needs: contract-tests
    steps:
      - uses: actions/checkout@v4

      - name: Scan mcp-server source
        id: guard
        uses: ./
        with:
          path: 'mcp-server'
          fail-on: 'critical'

      - name: Print outputs
        if: always()
        run: |
          echo "critical=${{ steps.guard.outputs.critical }}"
          echo "major=${{ steps.guard.outputs.major }}"
          echo "warning=${{ steps.guard.outputs.warning }}"
          echo "healthy=${{ steps.guard.outputs.healthy }}"
